    <h2>CONTACTING............</h2>

    <section class="main-form">
      <form action="#" method="POST">
        <fieldset>
          <legend>-HIT ME UP!-</legend>
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="Your full name"
          />
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="Enter you email"
          />
          <label for="phone">Phone</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            required
            placeholder="Enter your cell phone"
          />

          <label for="age">Select your age</label>
          <input type="date" id="age" name="age" required />

          <fieldset>
            <legend>-Why are you contacting me?-</legend>
            <select id="contact-mode" name="contact-mode" required>
              <option value="">work with me</option>
              <option value="co">Software creation</option>
              <option value="mx">Temporary Collaboration</option>
            </select>
          </fieldset>
          <label for="mensaje">Message</label>
          <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
          <br />
          <label>By what means would you like to be contacted?</label>
          <div>
            <input type="checkbox" id="phone1" name="answer" required />
            <label for="phone1">Phone</label>
            <input type="checkbox" id="email1" name="answer" required />
            <label for="email1">Email</label>
            <input type="checkbox" id="whatsapp" name="answer" required />
            <label for="whatsapp">WhatsApp</label>
          </div>
          <div>
            <br />
            <label>All the information is correct?</label>
            <br />
            <br />
            <input type="radio" id="answer" name="answer" value="yes" />
            <label for="answer">Yes</label>
            <br />
            <input type="radio" id="answer2" name="answer" value="no" />
            <label for="answer2">No</label>
          </div>
          <button type="submit">Send Message</button>
          <button type="reset">Reset</button>
        </fieldset>
      </form>
    </section>
